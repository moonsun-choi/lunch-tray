name: Deploy lunch tray PWA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Pages build folder
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html app.css manifest.json service-worker.js dist/
          cp -R icons dist/icons

      - name: Create env.js from one GitHub Secret
        env:
          ENV_JS_CONTENT: ${{ secrets.ENV_JS_CONTENT }}
        run: |
          if [ -z "$ENV_JS_CONTENT" ]; then
            echo "::error::ENV_JS_CONTENT secret이 비어 있습니다."
            exit 1
          fi

          printf '%s\n' "$ENV_JS_CONTENT" > dist/env.js

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
